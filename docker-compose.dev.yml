# 개발 모드 오버라이드 - 소스 변경 시 자동 반영
# 사용법: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# frontend: Vite HMR (src 변경 → 브라우저 즉시 반영, 재빌드 불필요)
# ai-server: uvicorn --reload (Python 파일 변경 → 자동 재시작)

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/tsconfig.json:/app/tsconfig.json
    environment:
      - VITE_BACKEND_URL=http://backend:8002
      - CHOKIDAR_USEPOLLING=true

  ai-server:
    volumes:
      - ./ai-server/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
